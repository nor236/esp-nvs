[toolchain]
channel    = "esp"
#channel    = "stable"
components = ["rust-src"]
targets = [
    "riscv32imac-unknown-none-elf",
    "riscv32imc-unknown-none-elf",
    # Xtensa targets require espup (ESP-RS toolchain fork):
    #   espup install
    # Ref: https://github.com/esp-rs/espup
     "xtensa-esp32-none-elf",
     "xtensa-esp32s2-none-elf",
     "xtensa-esp32s3-none-elf",
]
